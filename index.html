<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JamrokTabla Lehra 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* ── Colour palette ─────────────────────────────────────────
           Dusty rose / marigold / sage / ivory — pastel South-Asian
        ────────────────────────────────────────────────────────── */
        :root {
            --bg-grad-a:   #e8d5c4;   /* warm ivory */
            --bg-grad-b:   #d4b8a8;   /* dusty sandstone */
            --surface:     #fdf8f2;   /* parchment */
            --panel:       #f5ede3;   /* warm blush panel */
            --border:      #c9a882;   /* marigold-sand border */
            --border-soft: #ddc9b0;
            --accent1:     #b85c38;   /* terracotta */
            --accent2:     #d4956a;   /* marigold */
            --accent3:     #7a9e7e;   /* sage green */
            --accent4:     #a06b9a;   /* lotus purple */
            --text-main:   #4a2e1a;   /* deep brown */
            --text-mid:    #7a5540;
            --text-soft:   #a08060;
            /* tehai pastels */
            --tehai1:      #d4e8c2;   /* sage mint */
            --tehai2:      #f7d6d0;   /* petal rose */
            --tehai3:      #fce8c3;   /* soft marigold */
            /* active note highlight */
            --note-active: #e8a020;
            --note-play:   #c0392b;
            /* controller accent */
            --ctrl-bg:     #eef4f0;
            --ctrl-border: #7a9e7e;
            --ctrl-head:   #3d6b41;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(150deg, var(--bg-grad-a) 0%, var(--bg-grad-b) 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            margin-left: 80px;
            background: var(--surface);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 6px 28px rgba(74,46,26,0.15);
            border: 2px solid var(--border);
        }

        h1 {
            text-align: center;
            color: var(--accent1);
            margin: 0 0 24px 0;
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        /* ── Controls grid ─────────────────────────────────────── */
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 22px;
            padding: 18px;
            background: var(--panel);
            border-radius: 12px;
            border: 1.5px solid var(--border-soft);
        }
        .control-group.row-1-col-1 { grid-area: 1 / 1 / 2 / 2; }
        .control-group.row-1-col-2 { grid-area: 1 / 2 / 2 / 3; }
        .control-group.row-1-col-3 { grid-area: 1 / 3 / 2 / 4; }
        .control-group.row-2-col-1 { grid-area: 2 / 1 / 3 / 2; }
        .control-group.row-2-col-2 { grid-area: 2 / 2 / 3 / 3; }
        .control-group.row-2-col-3 { grid-area: 2 / 3 / 3 / 4; }
        .control-group.row-3-col-1 { grid-area: 3 / 1 / 4 / 3; }
        .control-group.row-3-col-3 { grid-area: 3 / 3 / 4 / 4; }
        @media (max-width: 1200px) {
            .controls { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
            .control-group.row-3-col-1, .control-group.row-3-col-3 { grid-area: auto; }
        }

        .control-group { display: flex; flex-direction: column; gap: 7px; }

        label {
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.85em;
            letter-spacing: 0.01em;
        }

        input[type="number"], input[type="range"], select {
            padding: 7px 10px;
            border: 1.5px solid var(--border);
            border-radius: 7px;
            background: #fff;
            font-size: 0.95em;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }
        input[type="range"] { padding: 4px 0; accent-color: var(--accent2); }
        .control-group input[type="number"] {
            padding: 4px 6px;
            margin-right: 4px;
            width: 54px;
            font-size: 0.9em;
        }

        /* ── Button group ──────────────────────────────────────── */
        .button-group {
            display: flex;
            gap: 9px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        button {
            padding: 10px 22px;
            font-size: 0.92em;
            font-weight: 600;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.22s;
            box-shadow: 0 3px 7px rgba(74,46,26,0.16);
            font-family: 'Inter', sans-serif;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(74,46,26,0.22); }

        .play-btn      { background: linear-gradient(135deg, #5a9e6f, #7abc8a); color: #fff; }
        .stop-btn      { background: linear-gradient(135deg, #c0392b, #e05a50); color: #fff; }
        .clear-btn     { background: linear-gradient(135deg, #c97d3a, #e0a060); color: #fff; }
        .transpose-btn { background: linear-gradient(135deg, #7a5fa8, #9b7ec8); color: #fff; }
        .preset-btn    { background: linear-gradient(135deg, #5a7bb5, #7a9ed8); color: #fff; font-size: 0.88em; padding: 7px 14px; }

        /* ── Toggle switch ─────────────────────────────────────── */
        .toggle-switch {
            position: relative; width: 48px; height: 25px;
            background: #cfc0b0; border-radius: 13px; cursor: pointer;
            transition: background 0.3s; flex-shrink: 0;
        }
        .toggle-switch.active { background: var(--accent3); }
        .toggle-slider {
            position: absolute; top: 3px; left: 3px;
            width: 19px; height: 19px; background: white;
            border-radius: 50%; transition: left 0.3s;
        }
        .toggle-switch.active .toggle-slider { left: 26px; }

        .value-display {
            display: inline-block; min-width: 38px;
            text-align: center; font-weight: 700; color: var(--accent1);
        }

        /* ── Grid section ──────────────────────────────────────── */
        .grid-section {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid var(--border-soft);
            margin-bottom: 18px;
            position: relative;
            left: -50px;
        }
        .grid-with-sargam { position: relative; }

        .sargam-wheel {
            position: absolute; left: 0; top: 0;
            background: rgba(245, 237, 227, 0.97);
            border: 1.5px solid var(--border);
            border-radius: 7px; padding: 4px 7px;
            box-shadow: 2px 0 8px rgba(74,46,26,0.12);
            z-index: 10; cursor: grab; user-select: none;
        }
        .sargam-note {
            height: 40px; display: flex; align-items: center;
            justify-content: center; text-align: center;
            font-weight: 700; color: var(--accent1);
            background: rgba(184,92,56,0.10);
            border-radius: 4px; font-size: 0.82em; margin: 0; min-width: 44px;
        }
        .sargam-note.blank {
            background: rgba(184,92,56,0.03);
            border: 1px dashed var(--border-soft);
        }

        .grid-wrapper {
            overflow-x: auto; background: white;
            padding: 20px; border-radius: 10px; padding-left: 55px;
        }
        .grid-row { display: flex; margin: 0; }
        .tehai-row, .beat-label-row, .playback-row { min-height: 30px; }
        .beat-label-row  { min-height: 35px; }
        .pitch-row       { min-height: 40px; }
        .playback-row    { min-height: 25px; }

        .row-label {
            width: 80px; display: flex; align-items: center;
            justify-content: center; font-weight: 600;
            color: var(--text-main);
            background: rgba(201,168,130,0.18);
            border-right: 2px solid var(--border-soft);
            flex-shrink: 0; font-size: 0.82em;
        }
        .grid-cells { display: flex; flex: 1; }

        .grid-cell {
            border: 1px solid var(--border-soft);
            cursor: pointer; transition: all 0.18s;
            background: #fff; display: flex; align-items: center;
            justify-content: center; font-size: 0.82em; font-weight: 600;
        }
        .grid-cell:hover { background: rgba(212,149,106,0.18); }

        /* Tehai — pastel */
        .grid-cell.tehai-group-1 { background: var(--tehai1); }
        .grid-cell.tehai-group-2 { background: var(--tehai2); }
        .grid-cell.tehai-group-3 { background: var(--tehai3); }

        /* Active note */
        .grid-cell.active {
            background: linear-gradient(135deg, #f0c060, #e8a020);
            box-shadow: inset 0 0 8px rgba(0,0,0,0.22);
        }
        .grid-cell.tehai-group-1.active { background: linear-gradient(135deg, #a8d8a8, #6aae6a); }
        .grid-cell.tehai-group-2.active { background: linear-gradient(135deg, #e8a0a0, #c05050); }
        .grid-cell.tehai-group-3.active { background: linear-gradient(135deg, #f0c060, #e8a020); }

        .grid-cell.playing {
            background: linear-gradient(135deg, #e07060, #c0392b);
            animation: pulse 0.28s;
        }

        /* Beat label */
        .beat-label-input {
            width: 100%; height: 100%; border: none; background: transparent;
            text-align: center; font-size: 0.75em;
            color: var(--accent1); font-weight: 700; padding: 2px;
            font-family: 'Inter', sans-serif;
        }
        .beat-label-input::placeholder { color: #b8a898; font-weight: 400; opacity: 1; }
        .beat-label-input:focus { outline: 2px solid var(--accent3); background: #fffaf5; }

        .measure-start { border-left: 2.5px solid var(--accent1); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.08); }
        }

        /* ── Preset section ────────────────────────────────────── */
        .preset-section {
            background: var(--panel);
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 14px;
            border: 1.5px solid var(--border-soft);
        }
        .preset-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

        /* ── Solo Controller ───────────────────────────────────── */
        .controller-toggle-btn {
            background: linear-gradient(135deg, var(--ctrl-head), #5a9e6f);
            color: #fff;
            padding: 9px 20px;
            font-size: 0.93em;
            font-weight: 700;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            margin-bottom: 12px;
            box-shadow: 0 3px 8px rgba(61,107,65,0.25);
            transition: all 0.22s;
            letter-spacing: 0.02em;
        }
        .controller-toggle-btn:hover { transform: translateY(-2px); }

        .controller-panel {
            background: var(--ctrl-bg);
            border: 1.5px solid var(--ctrl-border);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 18px;
        }
        .controller-panel h2 {
            color: var(--ctrl-head);
            margin: 0 0 14px 0;
            font-size: 1.25em;
            font-weight: 700;
        }

        /* status bar */
        .ctrl-status-bar {
            background: linear-gradient(135deg, #3d6b41, #5a9e6f);
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 14px;
            color: white;
        }
        .ctrl-status-bar h3 { margin: 0 0 8px 0; font-size: 1.1em; }
        .ctrl-status-info { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; }
        .ctrl-status-item {
            background: rgba(255,255,255,0.18);
            padding: 8px 14px; border-radius: 8px; min-width: 90px; text-align: center;
        }
        .ctrl-status-label { font-size: 0.78em; opacity: 0.88; }
        .ctrl-status-value { font-size: 1.25em; font-weight: 700; }
        .ctrl-beat-indicator { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
        .ctrl-beat-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: rgba(255,255,255,0.3); transition: all 0.18s;
        }
        .ctrl-beat-dot.active { background: #f0d060; transform: scale(1.35); box-shadow: 0 0 7px rgba(240,208,96,0.6); }
        .ctrl-beat-dot.sam { border: 2px solid #fff; }

        /* controller buttons */
        .ctrl-main-controls { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 14px; }
        .ctrl-start-btn { background: linear-gradient(135deg, #5a9e6f, #7abc8a); color: #fff; }
        .ctrl-next-btn  { background: linear-gradient(135deg, #c97d3a, #e0a060); color: #fff; }
        .ctrl-stop-btn  { background: linear-gradient(135deg, #c0392b, #e05a50); color: #fff; }
        .ctrl-reset-btn { background: linear-gradient(135deg, #7a5fa8, #9b7ec8); color: #fff; }
        .ctrl-main-controls button {
            padding: 9px 18px; font-size: 0.9em; font-weight: 700;
            border: none; border-radius: 8px; cursor: pointer;
            transition: all 0.22s; box-shadow: 0 3px 7px rgba(0,0,0,0.16);
            font-family: 'Inter', sans-serif;
        }
        .ctrl-main-controls button:hover:not(:disabled) { transform: translateY(-2px); }
        .ctrl-main-controls button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        /* intro/outro block */
        .ctrl-intro-outro {
            background: rgba(160,107,154,0.09);
            border: 1.5px solid rgba(160,107,154,0.35);
            border-radius: 10px; padding: 12px; margin-bottom: 12px;
        }
        .ctrl-intro-outro h4 { margin: 0 0 10px 0; color: var(--accent4); font-size: 0.92em; font-weight: 700; }

        /* tempo ramp block */
        .ctrl-tempo-block {
            background: rgba(184,92,56,0.07);
            border: 1.5px solid rgba(184,92,56,0.3);
            border-radius: 10px; padding: 14px; margin-bottom: 12px;
        }
        .ctrl-tempo-block h4 { margin: 0 0 10px 0; color: var(--accent1); font-size: 0.92em; font-weight: 700; }
        .tempo-ramp-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px;
        }
        .tempo-ramp-grid label { font-weight: 600; color: var(--text-main); font-size: 0.82em; display: block; margin-bottom: 3px; }
        .tempo-ramp-grid input[type="number"] {
            padding: 6px 8px; border: 1.5px solid var(--border-soft); border-radius: 6px;
            font-size: 0.9em; width: 100%; color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }
        .tempo-ramp-status {
            display: flex; align-items: center; gap: 10px; margin-top: 8px;
            font-size: 0.83em; color: var(--text-mid);
        }
        .tempo-ramp-bar-wrap {
            flex: 1; height: 8px; background: rgba(184,92,56,0.15);
            border-radius: 4px; overflow: hidden;
        }
        .tempo-ramp-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent1), var(--accent2));
            border-radius: 4px; transition: width 0.4s;
        }
        .tempo-ramp-active { color: var(--accent1); font-weight: 700; }

        .ctrl-toggle-row { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .ctrl-toggle {
            position: relative; width: 42px; height: 21px;
            background: #c0b0a0; border-radius: 11px; cursor: pointer;
            transition: background 0.28s; flex-shrink: 0;
        }
        .ctrl-toggle.active { background: var(--accent3); }
        .ctrl-toggle-knob {
            position: absolute; top: 2px; left: 2px;
            width: 17px; height: 17px; background: white;
            border-radius: 50%; transition: left 0.28s;
        }
        .ctrl-toggle.active .ctrl-toggle-knob { left: 23px; }

        /* structure preset strip */
        .ctrl-preset-strip {
            background: rgba(90,155,110,0.08);
            border: 1.5px solid rgba(90,155,110,0.3);
            border-radius: 10px; padding: 12px; margin-bottom: 12px;
        }
        .ctrl-preset-strip h4 { margin: 0 0 8px 0; color: var(--ctrl-head); font-size: 0.92em; font-weight: 700; }

        /* section items */
        .ctrl-sections-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ctrl-sections-header h4 { margin: 0; color: var(--ctrl-head); font-size: 0.95em; font-weight: 700; }

        /* section card: collapsed summary row + expandable detail */
        .ctrl-section-item {
            background: #fff; border-radius: 10px;
            margin-bottom: 8px; border: 1.5px solid #d8e8da; transition: border-color 0.22s, box-shadow 0.22s;
            overflow: hidden;
        }
        .ctrl-section-item.active { border-color: var(--accent3); box-shadow: 0 3px 8px rgba(90,158,111,0.22); }
        .ctrl-section-item.completed { opacity: 0.52; border-color: #c8c8c8; }

        .ctrl-section-summary {
            display: flex; align-items: center; gap: 8px; padding: 10px 12px;
            cursor: pointer; user-select: none; flex-wrap: wrap;
        }
        .ctrl-section-summary:hover { background: rgba(90,158,111,0.06); }
        .ctrl-section-num {
            min-width: 22px; height: 22px; border-radius: 50%;
            background: var(--border-soft); display: flex; align-items: center; justify-content: center;
            font-size: 0.75em; font-weight: 700; color: var(--text-mid); flex-shrink: 0;
        }
        .ctrl-section-item.active .ctrl-section-num { background: var(--accent3); color: #fff; }
        .ctrl-section-name-pill {
            font-weight: 700; color: var(--text-main); font-size: 0.9em; flex: 1; min-width: 80px;
        }
        .ctrl-section-chips { display: flex; gap: 5px; flex-wrap: wrap; }
        .ctrl-chip {
            background: rgba(201,168,130,0.18); border: 1px solid var(--border-soft);
            border-radius: 12px; padding: 2px 8px; font-size: 0.76em; color: var(--text-mid);
            font-weight: 600; white-space: nowrap;
        }
        .ctrl-chip.preset { background: rgba(90,155,110,0.12); border-color: rgba(90,155,110,0.3); color: var(--ctrl-head); }
        .ctrl-chip.cycles0 { background: rgba(160,107,154,0.1); border-color: rgba(160,107,154,0.3); color: var(--accent4); }
        .ctrl-section-expand-btn {
            background: none; border: none; cursor: pointer; padding: 2px 5px;
            color: var(--text-soft); font-size: 0.85em; transition: transform 0.2s; flex-shrink: 0;
        }
        .ctrl-section-item.expanded .ctrl-section-expand-btn { transform: rotate(180deg); }

        .ctrl-section-detail {
            display: none; padding: 0 12px 12px 12px; border-top: 1px solid #eee;
        }
        .ctrl-section-item.expanded .ctrl-section-detail { display: block; }

        .ctrl-section-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px; margin-top: 10px;
        }
        .ctrl-section-controls label { font-weight: 600; color: var(--text-main); font-size: 0.82em; display: block; margin-bottom: 3px; }
        .ctrl-section-controls input[type="number"],
        .ctrl-section-controls input[type="text"],
        .ctrl-section-controls select {
            padding: 6px 8px; border: 1.5px solid var(--border-soft); border-radius: 6px;
            font-size: 0.88em; width: 100%; color: var(--text-main);
            font-family: 'Inter', sans-serif;
        }
        .ctrl-section-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .ctrl-section-reorder { display: flex; gap: 4px; margin-left: auto; }

        .ctrl-sm-btn {
            padding: 5px 11px; font-size: 0.82em; font-weight: 700;
            border: none; border-radius: 7px; cursor: pointer;
            transition: all 0.22s; box-shadow: 0 2px 5px rgba(0,0,0,0.12);
            font-family: 'Inter', sans-serif;
        }
        .ctrl-sm-btn:hover { transform: translateY(-1px); }
        .ctrl-sm-btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }
        .ctrl-add-btn    { background: linear-gradient(135deg, #5a9e6f, #7abc8a); color: #fff; }
        .ctrl-delete-btn { background: linear-gradient(135deg, #c0392b, #e05a50); color: #fff; }
        .ctrl-load-btn   { background: linear-gradient(135deg, #c97d3a, #e0a060); color: #fff; }
        .ctrl-dupe-btn   { background: linear-gradient(135deg, #5a7bb5, #7a9ed8); color: #fff; }
        .ctrl-capture-btn { background: linear-gradient(135deg, #a06b9a, #c08ab8); color: #fff; }
        .ctrl-move-btn   { background: rgba(120,100,80,0.12); color: var(--text-mid); box-shadow: none; border: 1px solid var(--border-soft); }
        .ctrl-move-btn:hover { background: rgba(120,100,80,0.22); }
        .ctrl-tempo-btn  { background: linear-gradient(135deg, var(--accent1), var(--accent2)); color: #fff; }

        /* keyboard shortcut hint */
        .kbd-hint { font-size: 0.75em; color: var(--text-soft); margin-left: 4px; }
        kbd { display: inline-block; padding: 1px 5px; border: 1px solid var(--border-soft);
              border-radius: 4px; background: #f8f4ee; font-size: 0.9em; font-family: monospace; }
        /* ── END STYLES ── */
    </style>
</head>
<body>
    <div class="sargam-wheel" id="sargamWheel" style="display: none;">
        </div>

    <div class="container">
        <h1>JamrokTabla Lehra 2026</h1>
        
        <div class="preset-section">
            <label>Preset melodies:</label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
               <select id="presetSelect" style="flex-grow: 1;" onchange="loadSelectedPreset()">
    </select>
                <button class="preset-btn" onclick="saveCurrentAsPreset()">💾 Save Current</button>
            </div>
        </div>

        <!-- ===== SOLO STRUCTURE CONTROLLER PANEL ===== -->
        <button class="controller-toggle-btn" onclick="toggleControllerPanel()">🎵 Solo Structure Controller ▼</button>
        <div class="controller-panel" id="controllerPanel" style="display:none;">
            <h2>🎵 Lehra Solo Structure Controller</h2>

            <div class="ctrl-status-bar">
                <h3 id="ctrlStatusTitle">Ready to Start</h3>
                <div class="ctrl-status-info">
                    <div class="ctrl-status-item">
                        <div class="ctrl-status-label">Section</div>
                        <div class="ctrl-status-value" id="ctrlSectionDisplay">-</div>
                    </div>
                    <div class="ctrl-status-item">
                        <div class="ctrl-status-label">Cycle</div>
                        <div class="ctrl-status-value" id="ctrlCycleDisplay">0/0</div>
                    </div>
                    <div class="ctrl-status-item">
                        <div class="ctrl-status-label">Beat</div>
                        <div class="ctrl-status-value" id="ctrlBeatDisplay">-</div>
                    </div>
                    <div class="ctrl-status-item">
                        <div class="ctrl-status-label">BPM</div>
                        <div class="ctrl-status-value" id="ctrlBpmDisplay">-</div>
                    </div>
                </div>

        let currentNotes = allNotes;
        let grid = [];
        let beatLabels = [];
        let division = 2; // Default to eighth notes (Division: 2)
        let cellWidthOverride = 0;
        
        function initGrid() {
            const beats = parseInt(document.getElementById('beats').value);
            division = parseInt(document.getElementById('divisionSelect').value);
            const totalBeats = beats * division;
            
            // Tehai logic remains the same
            if (beats < 7 || !tehaiPatterns[beats]) {
                tehaiEnabled = false;
                document.getElementById('tehaiToggle').classList.remove('active');
                document.getElementById('tehaiStatus').textContent = 'Off';
            } else {
                 if (document.getElementById('tehaiToggle').classList.contains('active')) {
                     tehaiEnabled = true;
                     document.getElementById('tehaiStatus').textContent = 'On';
                 } else {
                    tehaiEnabled = false;
                 }
            }

            grid = Array(currentNotes.length).fill().map(() => Array(totalBeats).fill(false));
            
            // Re-initialize beatLabels to the new length
            const oldBeatLabels = [...beatLabels];
            beatLabels = Array(totalBeats).fill('');
            oldBeatLabels.forEach((label, idx) => {
                if (idx < totalBeats) {
                    beatLabels[idx] = label;
                }
            });
            
            renderGrid();
        }
        
        // Function to transpose the entire melody up or down one pitch
        function transposeMelody(direction) {
            stopPlayback();
            // Array index 0 is the highest note (D5), so 'up' is a -1 index shift.
            const shift = direction === 'up' ? -1 : 1; 
            const numPitches = currentNotes.length;
            const totalBeats = grid[0].length;

            const newGrid = Array(numPitches).fill().map(() => Array(totalBeats).fill(false));

            for (let i = 0; i < numPitches; i++) {
                for (let j = 0; j < totalBeats; j++) {
                    if (grid[i][j]) {
                        let newIndex = i + shift;
                        
                        // Wrap around logic
                        if (newIndex < 0) {
                            newIndex = numPitches - 1; // Top wraps to bottom
                        } else if (newIndex >= numPitches) {
                            newIndex = 0; // Bottom wraps to top
                        }
                        
                        newGrid[newIndex][j] = true;
                    }
                }
            }

            grid = newGrid;
            renderGrid();
        }
// ── Inline Tempo Ramp ──────────────────────────────────────────────
let tempoChangeActive = false;
let startBPM = 0;
let targetBPM = 0;
let totalCycles = 0;
let currentCycle = 0;

function activateTempoRamp() {
    const startVal = parseInt(document.getElementById('tempoRampStart').value);
    const targetVal = parseInt(document.getElementById('tempoRampTarget').value);
    const cyclesVal = parseInt(document.getElementById('tempoRampCycles').value);
    if (isNaN(targetVal) || targetVal < 12 || targetVal > 600) {
        document.getElementById('tempoRampLabel').textContent = '⚠ Set a valid Target BPM';
        return;
    }
    if (isNaN(cyclesVal) || cyclesVal < 1) {
        document.getElementById('tempoRampLabel').textContent = '⚠ Set cycles (≥1)';
        return;
    }
    startBPM = isNaN(startVal) ? parseInt(document.getElementById('bpm').value) || 120 : startVal;
    targetBPM = targetVal;
    totalCycles = cyclesVal;
    currentCycle = 0;
    tempoChangeActive = true;
    document.getElementById('tempoRampStart').value = startBPM;
    document.getElementById('bpm').value = startBPM;
    document.getElementById('bpmInput').value = startBPM;
    document.getElementById('bpmValue').textContent = startBPM;
    updateTempoRampUI();
}

function cancelTempoRamp() {
    tempoChangeActive = false;
    currentCycle = 0;
    document.getElementById('tempoRampLabel').textContent = 'Not armed';
    document.getElementById('tempoRampBar').style.width = '0%';
    document.getElementById('tempoRampPct').textContent = '';
    document.getElementById('tempoRampLabel').classList.remove('tempo-ramp-active');
}

function updateTempoRampUI() {
    const label = document.getElementById('tempoRampLabel');
    const bar = document.getElementById('tempoRampBar');
    const pct = document.getElementById('tempoRampPct');
    if (!tempoChangeActive) return;
    const progress = Math.min(currentCycle / totalCycles, 1);
    label.textContent = `Ramping: ${startBPM}→${targetBPM} BPM`;
    label.classList.add('tempo-ramp-active');
    bar.style.width = (progress * 100) + '%';
    pct.textContent = Math.round(progress * 100) + '%';
}

function updateTempoChange() {
    if (!tempoChangeActive) return;
    currentCycle++;
    if (currentCycle >= totalCycles) {
        document.getElementById('bpm').value = targetBPM;
        document.getElementById('bpmInput').value = targetBPM;
        document.getElementById('bpmValue').textContent = targetBPM;
        tempoChangeActive = false;
        document.getElementById('tempoRampLabel').textContent = `Done: ${targetBPM} BPM`;
        document.getElementById('tempoRampBar').style.width = '100%';
        document.getElementById('tempoRampPct').textContent = '100%';
        return;
    }
    const progress = currentCycle / totalCycles;
    const newBPM = Math.round(startBPM + (targetBPM - startBPM) * progress);
    document.getElementById('bpm').value = newBPM;
    document.getElementById('bpmInput').value = newBPM;
    document.getElementById('bpmValue').textContent = newBPM;
    updateTempoRampUI();
    if (intervalId) {
        clearInterval(intervalId);
        const interval = (60 / (newBPM * division)) * 1000;
        intervalId = setInterval(playBeat, interval);
    }
}

        // Function to populate the dropdown menu, including saved presets
        function populatePresetDropdown() {
            const select = document.getElementById('presetSelect');
            select.innerHTML = '';
            
            // Add a default prompt option
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = '--- Select a Preset Melody ---';
            select.appendChild(defaultOption);

            // Add built-in presets
            Object.keys(newPresets).sort((a, b) => {
                // Custom sorting to keep 29 (7 1/4) in numerical order
                const numA = parseInt(a);
                const numB = parseInt(b);
                if (numA !== numB) return numA - numB;
                return a.localeCompare(b);
            }).forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                select.appendChild(option);
            });

            // Add saved custom presets from localStorage
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('preset_')) {
                    const presetName = key.substring(7); // Remove 'preset_'
                    const option = document.createElement('option');
                    option.value = key;
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        option.textContent = 'Custom: ' + presetName + ' (' + data.beats + ' beats)';
                    } catch (e) {
                        option.textContent = 'Custom: ' + presetName;
                    }
                    select.appendChild(option);
                }
            }
        }

        // UPDATED function to load the selected preset
        function loadSelectedPreset() {
            const selectedValue = document.getElementById('presetSelect').value;
            if (!selectedValue) return;

            stopPlayback();
            
            let preset;
            const beatsInput = document.getElementById('beats');
            const divisionSelect = document.getElementById('divisionSelect');
            const soundTypeSelect = document.getElementById('soundType');

            if (selectedValue.startsWith('preset_')) {
                // Load from localStorage (Custom Presets) - Does not override soundType
                try {
                    const storedData = JSON.parse(localStorage.getItem(selectedValue));
                    preset = {
                        beats: storedData.beats,
                        division: storedData.division,
                        grid: storedData.grid,
                        labels: storedData.labels,
                    };
                    
                    // Apply saved settings
                    beatsInput.value = preset.beats;
                    divisionSelect.value = preset.division;
                    division = preset.division; // Update global division

                    initGrid(); 
                    
                    // Need to ensure the new grid is the correct size before copying
                    const totalBeats = preset.beats * preset.division;
                    grid = Array(currentNotes.length).fill().map(() => Array(totalBeats).fill(false));
                    
                    // Deep copy the grid data, assuming saved grid size matches the current totalBeats
                    preset.grid.forEach((row, rowIdx) => {
                        row.forEach((cell, cellIdx) => {
                            if (rowIdx < grid.length && cellIdx < grid[rowIdx].length) {
                                grid[rowIdx][cellIdx] = cell;
                            }
                        });
                    });
                    
                    beatLabels = preset.labels.slice(0, totalBeats); // Use the slice to prevent errors
                    
                } catch (e) {
                    alert('Error loading custom preset: ' + e.message);
                    return;
                }
            } else {
                // Load from built-in presets (Applies new default settings)
                preset = newPresets[selectedValue];
                
                // 1. Set Correct Beats
                beatsInput.value = preset.beats;

                // 2. Default to Eighth Notes (Division: 2)
                divisionSelect.value = preset.division || '2';
                division = parseInt(divisionSelect.value);

                // 3. Default to Note + Low Octave
                soundTypeSelect.value = preset.soundType || 'octave';

                // Re-initialize grid size based on new beats and division
                initGrid(); 
                
                // Clear the grid before applying the pattern
                grid = grid.map(row => row.map(() => false));
                beatLabels = beatLabels.map(() => '');

                // Apply melody pattern
                preset.pattern.forEach(([noteIdx, beat]) => {
                    const totalBeats = preset.beats * division;
                    if (grid[noteIdx] && beat < totalBeats) {
                        grid[noteIdx][beat] = true;
                    }
                });
            }

            // Update Tehai state based on loaded beats
            const beats = parseInt(beatsInput.value);
            const canTehai = beats >= 7 && tehaiPatterns[beats];
            tehaiEnabled = canTehai;
            document.getElementById('tehaiToggle').classList.toggle('active', canTehai);
            document.getElementById('tehaiStatus').textContent = canTehai ? 'On' : 'Off';
            
            renderGrid();
        }
        
        function saveCurrentAsPreset() {
            const name = prompt('Enter a name for your custom melody:');
            if (name) {
                // Ensure grid and labels are up-to-date with current settings
                const beats = parseInt(document.getElementById('beats').value);
                const division = parseInt(document.getElementById('divisionSelect').value);
                const preset = {
                    beats: beats,
                    division: division,
                    grid: grid.map(row => [...row]),

                };
                
                // Save to browser's localStorage
                const key = 'preset_' + name.replace(/[^a-zA-Z0-9\s]/g, '_').replace(/\s/g, '_'); // Sanitize key
                localStorage.setItem(key, JSON.stringify(preset));

                populatePresetDropdown(); // Update the dropdown with the new saved preset
                document.getElementById('presetSelect').value = key; // Select the new preset
            }
        }

        // --- Other Functions (Kept as before) ---
        
        function getTehaiBeats() {
            // ... (Tehai logic remains the same)
            const taal = parseInt(document.getElementById('beats').value); 
            const totalBeats = taal * division;
            
            if (taal < 7 || !tehaiPatterns[taal] || !tehaiEnabled) return [];
            
            const pattern = tehaiPatterns[taal];
            const beats = [];
            
            const tehaiGroups = [
                { start: pattern.L1, ds: pattern.DS1, color: 'tehai-group-1' },
                { start: pattern.L2, ds: pattern.DS2, color: 'tehai-group-2' },
                { start: pattern.L3, ds: pattern.DS3, color: 'tehai-group-3' }
            ];

            tehaiGroups.forEach(group => {
                let startBeat = (group.start - 1) * division;
                
                for (let i = 0; i < group.ds * division; i++) {
                    let beatIndex = (startBeat + i) % totalBeats;
                    const type = (i === 0) ? 'Dha' : '';

                    beats.push({ 
                        beat: beatIndex, 
                        type: type, 
                        colorClass: group.color 
                    });
                }
            });
            
            return beats;
        }
        
        function renderGrid() {
            const wrapper = document.getElementById('gridWrapper');
            const beats = grid[0].length;
            const tehaiBeats = getTehaiBeats();
            const tehaiMap = {};
            tehaiBeats.forEach(t => { tehaiMap[t.beat] = t; });
            
            const containerWidth = wrapper.clientWidth - 80 - 55; // subtract row-label (80px) + padding-left (55px)
            const autoCell = Math.floor(containerWidth / beats);
            let cellWidth = cellWidthOverride > 0 ? cellWidthOverride : Math.max(22, Math.min(80, autoCell));
            
            let html = '';
            
            // Render Sargam wheel aligned with pitch rows - BOTTOM TO TOP
            const sargamWheel = document.getElementById('sargamWheel');
            let sargamHtml = '';
            
            for (let i = 0; i < currentNotes.length; i++) {
                const note = currentNotes[i];
                const sargamClass = note.sargam === 'blank' ? 'sargam-note blank' : 'sargam-note';
                const sargamText = note.sargam === 'blank' ? '' : note.sargam;
                sargamHtml += `<div class="${sargamClass}">${sargamText}</div>`;
            }
            sargamWheel.innerHTML = sargamHtml;
            sargamWheel.style.display = 'block';
            
            // --- Sargam Persistence Logic Update ---
            const tehaiOffset = (tehaiEnabled && tehaiBeats.length > 0) ? 30 : 0; 
            const beatLabelOffset = 35;
            const defaultTopOffset = tehaiOffset + beatLabelOffset;

            // Only reset to the calculated default if no last position is saved
            if (lastSargamTop === null) {
                sargamWheel.style.top = defaultTopOffset + 'px';
                sargamWheel.style.left = '0px';
                lastSargamTop = defaultTopOffset;
                lastSargamLeft = 0;
            } else {
                // Update the calculated default in case the grid height changes (due to tehai)
                // This ensures the initial top is correct, but respects drag position otherwise
                if (parseInt(sargamWheel.style.top) === lastSargamTop) {
                    sargamWheel.style.top = defaultTopOffset + 'px';
                    lastSargamTop = defaultTopOffset;
                } else {
                    sargamWheel.style.top = lastSargamTop + 'px';
                }
                sargamWheel.style.left = lastSargamLeft + 'px'; // Use last drag position
            }
            // --- End Sargam Persistence Logic Update ---
            
            if (tehaiEnabled && tehaiBeats.length > 0) { 
                html += '<div class="grid-row tehai-row">';
                html += '<div class="row-label">Tehai</div>';
                html += '<div class="grid-cells">';
                for (let b = 0; b < beats; b++) {
                    const tehai = tehaiMap[b];
                    const classes = ['grid-cell'];
                    if (tehai?.colorClass) classes.push(tehai.colorClass); 
                    if (b % (4 * division) === 0) classes.push('measure-start');
                    html += `<div class="${classes.join(' ')}" style="flex: 0 0 ${cellWidth}px; width: ${cellWidth}px;">${tehai?.type || ''}</div>`;
                }
                html += '</div></div>';
            }
            
            html += '<div class="grid-row beat-label-row">';
            html += '<div class="row-label">Beat #</div>';
            html += '<div class="grid-cells">';
            for (let b = 0; b < beats; b++) {
                const tehai = tehaiMap[b];
                const classes = ['grid-cell'];
                if (tehai?.colorClass) classes.push(tehai.colorClass); 
                if (b % (4 * division) === 0) classes.push('measure-start');
                html += `<div class="${classes.join(' ')}" style="flex: 0 0 ${cellWidth}px; width: ${cellWidth}px;">`;
                // The beat number is now the placeholder

        // --- Harmonium Additive Synthesis Profiles ---
        // Each profile defines harmonic overtones (multiplier, amplitude) and envelope shape
        const harmoniumProfiles = {

                harmonics: [

        function playTone(frequency, duration, noteIdx) {
            const soundType = document.getElementById('soundType').value;
            const volume = parseInt(document.getElementById('volume').value) / 100;

            if (harmoniumProfiles[soundType]) {
                playHarmoniumTone(frequency, duration, volume, harmoniumProfiles[soundType], noteIdx);
            } else if (soundType === 'octave') {
                playOscillator(frequency, duration, volume * 0.3, 'sine');
                playOscillator(frequency / 2, duration, volume * 0.2, 'sine');
            } else {
                const waveType = soundType === 'sharp' ? 'square' : 'sine';
                playOscillator(frequency, duration, volume * 0.3, waveType);
            }
        }

        function stopLegatoVoice(noteIdx) {
            const voice = legatoVoices[noteIdx];
            if (!voice) return;
            const now = audioContext.currentTime;
            const releaseTime = 0.05;
            try {
                voice.masterGain.gain.cancelScheduledValues(now);
                voice.masterGain.gain.setValueAtTime(voice.masterGain.gain.value, now);
                voice.masterGain.gain.exponentialRampToValueAtTime(0.001, now + releaseTime);
            } catch(e) {}
            voice.oscillators.forEach(osc => {
                try { osc.stop(now + releaseTime + 0.01); } catch(e) {}
            });
            delete legatoVoices[noteIdx];
        }

        function playHarmoniumTone(frequency, duration, volume, profile, noteIdx) {
            const now = audioContext.currentTime;
            const targetGain = volume * profile.masterGain;

            // Stop whatever was playing on this row immediately
            stopLegatoVoice(noteIdx);

            // Build new persistent voice — runs until next note fires or Stop pressed
            const masterGain = audioContext.createGain();
            masterGain.connect(audioContext.destination);
            masterGain.gain.setValueAtTime(0, now);
            masterGain.gain.linearRampToValueAtTime(targetGain, now + profile.attackTime);

            const oscillators = [];

            if (profile.subOctave > 0) {
                const subOsc = audioContext.createOscillator();
                const subGain = audioContext.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.value = frequency / 2;
                subGain.gain.setValueAtTime(profile.subOctave, now);
                subOsc.connect(subGain);
                subGain.connect(masterGain);
                subOsc.start(now);
                oscillators.push(subOsc);
            }

            profile.harmonics.forEach(({ mult, amp }) => {
                const osc = audioContext.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = frequency * mult;
                osc.detune.value = (Math.random() - 0.5) * 4;
                const partialGain = audioContext.createGain();
                partialGain.gain.setValueAtTime(amp, now);
                osc.connect(partialGain);
                partialGain.connect(masterGain);
                osc.start(now);
                oscillators.push(osc);
            });

            playChiff(frequency, volume);

            legatoVoices[noteIdx] = { masterGain, oscillators, frequency };
        }

        function playChiff(frequency, volume) {
            const now = audioContext.currentTime;
            const chiffDuration = 0.018;
            const bufferSize = Math.floor(audioContext.sampleRate * chiffDuration);
            const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.35;
            const noiseSource = audioContext.createBufferSource();
            noiseSource.buffer = noiseBuffer;
            const noiseFilter = audioContext.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = frequency * 2.5;
            noiseFilter.Q.value = 1.8;
            const noiseGain = audioContext.createGain();
            noiseGain.gain.setValueAtTime(volume * 0.12, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + chiffDuration);
            noiseSource.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioContext.destination);
            noiseSource.start(now);
            noiseSource.stop(now + chiffDuration);
        }

        function playOscillator(frequency, duration, gainValue, type) {
            const osc = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            osc.type = type;
            osc.frequency.value = frequency;
            
            gainNode.gain.setValueAtTime(gainValue, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            osc.start(audioContext.currentTime);
            osc.stop(audioContext.currentTime + duration);
            
            activeOscillators.push({ osc, gainNode });
            
            setTimeout(() => {
                const idx = activeOscillators.findIndex(o => o.osc === osc);
                if (idx !== -1) activeOscillators.splice(idx, 1);
            }, duration * 1000);
        }
        
        // Warm low-pitched tabla-like metronome click
        function playMetronome(isBeat1) {
            const now = audioContext.currentTime;
            const vol = parseInt(document.getElementById('volume').value) / 100;

            // Fundamental tone — low wooden thud
            const osc = audioContext.createOscillator();
            const oscGain = audioContext.createGain();
            osc.type = 'sine';
            osc.frequency.value = isBeat1 ? 200 : 140; // beat-1 slightly higher
            osc.frequency.setTargetAtTime(isBeat1 ? 100 : 80, now, 0.025);
            oscGain.gain.setValueAtTime(vol * 0.45, now);
            oscGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
            osc.connect(oscGain);
            oscGain.connect(audioContext.destination);
            osc.start(now);
            osc.stop(now + 0.13);

            // Short noise transient for the "click" character
            const bufSize = Math.floor(audioContext.sampleRate * 0.04);
            const buf = audioContext.createBuffer(1, bufSize, audioContext.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
            const noise = audioContext.createBufferSource();
            noise.buffer = buf;
            const noiseFilter = audioContext.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 400;
            const noiseGain = audioContext.createGain();
            noiseGain.gain.setValueAtTime(vol * 0.18, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(audioContext.destination);
            noise.start(now);
            noise.stop(now + 0.04);
        }
        
        function playBeat() {

                            <div>
                                <label>Beats</label>
                                <input type="number" min="1" max="201" value="${displayBeats}" onchange="ctrlUpdateSection(${i},'beats',this.value)">
                            </div>
                            <div>
                                <label>Cycles <small style="font-weight:400;color:var(--text-soft)">(0=∞)</small></label>
                                <input type="number" min="0" value="${displayCycles}" onchange="ctrlUpdateSection(${i},'cycles',this.value)">
                            </div>
                            <div>
                                <label>Division</label>
                                <select onchange="ctrlUpdateSection(${i},'division',this.value)">
                                    <option value="1" ${displayDivision==1?'selected':''}>Quarter Notes</option>
                                    <option value="2" ${displayDivision==2?'selected':''}>Eighth Notes</option>
                                    <option value="4" ${displayDivision==4?'selected':''}>16th Notes</option>
                                    <option value="8" ${displayDivision==8?'selected':''}>32nd Notes</option>
                                </select>
                            </div>
                            <div>
                                <label>Melody Preset</label>
                                <select onchange="ctrlUpdateSectionPreset(${i},this.value)">
                                    <option value="">— Current Grid —</option>
                                    ${presetOptions}
                                </select>
                            </div>
                        </div>
                        <div class="ctrl-section-actions">
                            <button class="ctrl-sm-btn ctrl-load-btn" onclick="ctrlLoadSectionIntoGrid(${i})" title="Load this section into the main grid">📋 To Grid</button>
                            <button class="ctrl-sm-btn ctrl-dupe-btn"  onclick="ctrlDuplicateSection(${i})"   title="Duplicate this section">⧉ Dupe</button>
                            <button class="ctrl-sm-btn ctrl-capture-btn" onclick="ctrlCaptureGrid(${i})"      title="Capture current grid settings into this section">⬇ Capture Grid</button>
                            <div class="ctrl-section-reorder">
                                <button class="ctrl-sm-btn ctrl-move-btn" onclick="ctrlMoveSection(${i},-1)" ${i===0?'disabled':''} title="Move up">↑</button>
                                <button class="ctrl-sm-btn ctrl-move-btn" onclick="ctrlMoveSection(${i},+1)" ${i===ctrlSections.length-1?'disabled':''} title="Move down">↓</button>
                                <button class="ctrl-sm-btn ctrl-delete-btn" onclick="ctrlDeleteSection(${i})" ${ctrlSections.length===1?'disabled':''} title="Delete section">✕</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function ctrlToggleExpand(index) {
            if (ctrlExpandedSections.has(index)) {
                ctrlExpandedSections.delete(index);
            } else {
                ctrlExpandedSections.add(index);
            }
            ctrlRenderSections();
        }

        function ctrlDuplicateSection(index) {
            const copy = { ...ctrlSections[index], name: ctrlSections[index].name + ' (copy)' };
            ctrlSections.splice(index + 1, 0, copy);
            ctrlExpandedSections.add(index + 1);
            ctrlRenderSections();
        }

        function ctrlMoveSection(index, direction) {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= ctrlSections.length) return;
            // Swap
            [ctrlSections[index], ctrlSections[newIndex]] = [ctrlSections[newIndex], ctrlSections[index]];
            // Update expanded set
            const wasExpanded = ctrlExpandedSections.has(index);
            const targetWasExpanded = ctrlExpandedSections.has(newIndex);
            wasExpanded ? ctrlExpandedSections.add(newIndex) : ctrlExpandedSections.delete(newIndex);
            targetWasExpanded ? ctrlExpandedSections.add(index) : ctrlExpandedSections.delete(index);
            ctrlRenderSections();
        }

        function ctrlCaptureGrid(index) {
            const beats    = parseInt(document.getElementById('beats').value);
            const div      = parseInt(document.getElementById('divisionSelect').value);
            const bpm      = parseInt(document.getElementById('bpm').value);
            const preset   = document.getElementById('presetSelect').value;
            ctrlSections[index].beats    = beats;
            ctrlSections[index].division = div;
            ctrlSections[index].bpm      = bpm;
            ctrlSections[index].preset   = (preset && !preset.startsWith('preset_')) ? preset : '';
            ctrlExpandedSections.add(index);
            ctrlRenderSections();
        }

        function ctrlUpdateSectionPreset(index, presetName) {
            ctrlSections[index].preset = presetName;
            if (presetName && newPresets[presetName]) {
                const p = newPresets[presetName];
                ctrlSections[index].beats    = p.beats;
                ctrlSections[index].division = p.division || 2;
            }
            ctrlRenderSections();
        }

        function ctrlUpdateSection(index, field, value) {
            if (['beats','bpm','cycles','division'].includes(field)) {
                ctrlSections[index][field] = parseInt(value);
            } else {
                ctrlSections[index][field] = value;
            }
            // Only re-render the summary chips, not whole list (preserve scroll + focus)
            // Lightweight: just re-render sections without clearing expanded state
            ctrlRenderSections();
        }

        function ctrlAddSection() {
            const newIdx = ctrlSections.length;
            ctrlSections.push({ name: 'Section ' + (newIdx + 1), beats: '', bpm: parseInt(document.getElementById('bpm').value) || 120, cycles: 0, division: '', preset: '' });
            ctrlExpandedSections.add(newIdx);
            ctrlRenderSections();
        }

        function ctrlDeleteSection(index) {
            if (ctrlSections.length > 1) {
                ctrlSections.splice(index, 1);
                ctrlExpandedSections.delete(index);
                // Re-map expanded indices above the deleted one
                const updated = new Set();
                ctrlExpandedSections.forEach(i => { updated.add(i > index ? i - 1 : i); });
                ctrlExpandedSections.clear();
                updated.forEach(i => ctrlExpandedSections.add(i));
                ctrlRenderSections();
            }
        }

        function ctrlLoadSectionIntoGrid(index) {
            const s = ctrlSections[index];
            stopPlayback();
            const presetData = s.preset && newPresets[s.preset] ? newPresets[s.preset] : null;
            const resolvedBeats = s.beats !== '' ? s.beats : (presetData ? presetData.beats : parseInt(document.getElementById('beats').value) || 16);
            const resolvedDiv   = s.division !== '' ? s.division : (presetData ? presetData.division : parseInt(document.getElementById('divisionSelect').value) || 2);
            const resolvedBpm   = s.bpm !== '' ? s.bpm : parseInt(document.getElementById('bpm').value) || 120;
            document.getElementById('beats').value = resolvedBeats;
            document.getElementById('divisionSelect').value = resolvedDiv;
            document.getElementById('bpm').value = resolvedBpm;
            document.getElementById('bpmInput').value = resolvedBpm;
            document.getElementById('bpmValue').textContent = resolvedBpm;
            division = parseInt(resolvedDiv);
            initGrid();
            if (s.preset && newPresets[s.preset]) {
                document.getElementById('presetSelect').value = s.preset;
                loadSelectedPreset();
            }
        }

        function ctrlCreateBeatIndicator(beats) {
            const indicator = document.getElementById('ctrlBeatIndicator');
            indicator.innerHTML = '';
            for (let i = 0; i < beats; i++) {
                const dot = document.createElement('div');
                dot.className = `ctrl-beat-dot ${i === 0 ? 'sam' : ''}`;
                dot.dataset.beat = i;
                indicator.appendChild(dot);
            }
        }

        function ctrlUpdateBeatIndicator(beat) {
            document.querySelectorAll('.ctrl-beat-dot').forEach((dot, index) => {
                dot.classList.toggle('active', index === beat);
            });
        }

        function ctrlLoadMelodyForSection(section) {
            const resolvedPreset = section.preset && newPresets[section.preset] ? newPresets[section.preset] : null;
            const resolvedBeats    = section.beats    || (resolvedPreset ? resolvedPreset.beats    : parseInt(document.getElementById('beats').value) || 16);
            const resolvedDivision = section.division || (resolvedPreset ? resolvedPreset.division : parseInt(document.getElementById('divisionSelect').value) || 2);
            const totalBeats = resolvedBeats * resolvedDivision;
            ctrlCurrentGrid = Array(allNotes.length).fill().map(() => Array(totalBeats).fill(false));
            // store resolved values back for playback
            section._resolvedBeats    = resolvedBeats;
            section._resolvedDivision = resolvedDivision;
            if (resolvedPreset) {
                resolvedPreset.pattern.forEach(([noteIdx, beat]) => {
                    if (ctrlCurrentGrid[noteIdx] && beat < totalBeats) {
                        ctrlCurrentGrid[noteIdx][beat] = true;
                    }
                });
            } else {
                grid.forEach((row, ni) => {
                    row.forEach((active, bi) => {
                        if (active && bi < totalBeats) {
                            ctrlCurrentGrid[ni][bi] = true;
                        }
                    });
                });
            }
        }

        function ctrlPlayBeat() {
            const section = ctrlSections[ctrlCurrentSectionIndex];
            const sectionDivision = section._resolvedDivision || section.division || parseInt(document.getElementById('divisionSelect').value) || 2;
            const sectionBeats    = section._resolvedBeats    || section.beats    || parseInt(document.getElementById('beats').value) || 16;
            const totalBeats = sectionBeats * sectionDivision;
            const sectionBpm = section.bpm || parseInt(document.getElementById('bpm').value) || 120;
            const beatDuration = 60 / (sectionBpm * sectionDivision);

            // Play notes
            allNotes.forEach((note, noteIdx) => {
                if (ctrlCurrentGrid[noteIdx] && ctrlCurrentGrid[noteIdx][ctrlCurrentBeat]) {
                    Object.keys(legatoVoices).forEach(idx => stopLegatoVoice(parseInt(idx)));
                    playTone(note.freq, beatDuration, noteIdx);
                }
            });

            // Metronome
            if (metronomeEnabled && ctrlCurrentBeat % sectionDivision === 0) {
                playMetronome(ctrlCurrentBeat === 0);
            }

            // Sync BPM to main slider so it always reflects the playing tempo
            ctrlSyncBpmToMain(sectionBpm);

            document.getElementById('ctrlBeatDisplay').textContent = Math.floor(ctrlCurrentBeat / sectionDivision) + 1;
            document.getElementById('ctrlBpmDisplay').textContent = sectionBpm;
            ctrlUpdateBeatIndicator(Math.floor(ctrlCurrentBeat / sectionDivision));

            ctrlCurrentBeat++;

            const sectionCycles = (section.cycles !== '' && section.cycles !== undefined) ? parseInt(section.cycles) : 0;

            let endBeat = totalBeats;
            if (ctrlIsOutro) {
                const outroBeat = parseInt(document.getElementById('ctrlOutroBeat').value) || 1;
                endBeat = outroBeat * sectionDivision;
            }

            const cycleComplete = ctrlCurrentBeat >= (ctrlIsIntro ? totalBeats : endBeat);

            if (cycleComplete) {
                ctrlCurrentBeat = 0;

                if (ctrlIsIntro) {
                    ctrlIsIntro = false;
                    ctrlCurrentSectionIndex = 0;
                    ctrlCurrentCycle = 1;
                    const newSection = ctrlSections[0];
                    ctrlLoadMelodyForSection(newSection);
                    const nrd = newSection._resolvedDivision; const nrb = newSection._resolvedBeats;
                    const nrbpm = newSection.bpm || parseInt(document.getElementById('bpm').value) || 120;
                    ctrlCreateBeatIndicator(nrb);
                    ctrlUpdateStatus();
                    ctrlRenderSections();
                    document.getElementById('ctrlNextBtn').disabled = false;
                    clearInterval(ctrlIntervalId);
                    ctrlIntervalId = setInterval(ctrlPlayBeat, (60 / (nrbpm * nrd)) * 1000);
                } else if (ctrlIsOutro) {
                    ctrlStop();
                } else {
                    ctrlCurrentCycle++;
                    if (ctrlNextSectionRequested) {
                        ctrlNextSectionRequested = false;
                        ctrlProceedToNextSection();
                    } else if (sectionCycles === 0) {
                        ctrlUpdateStatus();
                    } else if (ctrlCurrentCycle > sectionCycles) {
                        ctrlProceedToNextSection();
                    } else {
                        ctrlUpdateStatus();
                    }
                }
            }
        }

        function ctrlProceedToNextSection() {
            if (ctrlCurrentSectionIndex < ctrlSections.length - 1) {
                ctrlCurrentSectionIndex++;
                ctrlCurrentCycle = 1;
                ctrlCurrentBeat = 0;
                const section = ctrlSections[ctrlCurrentSectionIndex];
                ctrlLoadMelodyForSection(section);
                const rb = section._resolvedBeats; const rd = section._resolvedDivision;
                const rbpm = section.bpm || parseInt(document.getElementById('bpm').value) || 120;
                ctrlCreateBeatIndicator(rb);
                ctrlUpdateStatus();
                ctrlRenderSections();
                document.getElementById('ctrlNextBtn').disabled = false;
                clearInterval(ctrlIntervalId);
                ctrlIntervalId = setInterval(ctrlPlayBeat, (60 / (rbpm * rd)) * 1000);
            } else {
                if (ctrlOutroEnabled) {
                    ctrlStartOutro();
                } else {
                    ctrlStop();
                }
            }
        }

        function ctrlStart() {
            if (ctrlIsPlaying) return;
            ctrlIsPlaying = true;
            ctrlCurrentBeat = 0;
            document.getElementById('ctrlStartBtn').disabled = true;
            document.getElementById('ctrlStopBtn').disabled = false;

            if (ctrlIntroEnabled) {
                document.getElementById('ctrlNextBtn').disabled = true;
                ctrlStartIntro();
            } else {
                ctrlCurrentSectionIndex = 0;
                ctrlCurrentCycle = 1;
                const section = ctrlSections[0];
                ctrlLoadMelodyForSection(section);
                const rb = section._resolvedBeats; const rd = section._resolvedDivision;
                const rbpm = section.bpm || parseInt(document.getElementById('bpm').value) || 120;
                ctrlCreateBeatIndicator(rb);
                ctrlUpdateStatus();
                ctrlRenderSections();
                document.getElementById('ctrlNextBtn').disabled = false;
                ctrlIntervalId = setInterval(ctrlPlayBeat, (60 / (rbpm * rd)) * 1000);
            }
        }

        function ctrlNextSection() {
            if (!ctrlIsPlaying) return;
            ctrlNextSectionRequested = true;
            document.getElementById('ctrlNextBtn').disabled = true;
        }

        function ctrlStop() {
            ctrlIsPlaying = false;
            ctrlIsIntro = false;
            ctrlIsOutro = false;
            ctrlNextSectionRequested = false;
            if (ctrlIntervalId) { clearInterval(ctrlIntervalId); ctrlIntervalId = null; }
            Object.keys(legatoVoices).forEach(idx => stopLegatoVoice(parseInt(idx)));
            document.getElementById('ctrlStartBtn').disabled = false;
            document.getElementById('ctrlStopBtn').disabled = true;
            document.getElementById('ctrlNextBtn').disabled = true;
            ctrlUpdateStatus();
            ctrlRenderSections();
            document.getElementById('ctrlBeatIndicator').innerHTML = '';
        }

        function ctrlReset() {
            ctrlStop();
            ctrlCurrentSectionIndex = -1;
            ctrlCurrentCycle = 0;
            ctrlCurrentBeat = 0;
            document.getElementById('ctrlStatusTitle').textContent = 'Ready to Start';
            document.getElementById('ctrlSectionDisplay').textContent = '-';
            document.getElementById('ctrlCycleDisplay').textContent = '0/0';
            document.getElementById('ctrlBeatDisplay').textContent = '-';
            document.getElementById('ctrlBpmDisplay').textContent = '-';
            ctrlRenderSections();
        }

        function ctrlStartIntro() {
            ctrlIsIntro = true;
            ctrlCurrentSectionIndex = 0;
            const section = ctrlSections[0];
            ctrlLoadMelodyForSection(section);
            const rd = section._resolvedDivision;
            const rbpm = section.bpm || parseInt(document.getElementById('bpm').value) || 120;
            const introBeat = parseInt(document.getElementById('ctrlIntroBeat').value) || 1;
            ctrlCurrentBeat = (introBeat - 1) * rd;
            ctrlCreateBeatIndicator(section._resolvedBeats);
            document.getElementById('ctrlStatusTitle').textContent = 'Playing Intro';
            document.getElementById('ctrlSectionDisplay').textContent = 'Intro';
            document.getElementById('ctrlCycleDisplay').textContent = '1/1';
            ctrlIntervalId = setInterval(ctrlPlayBeat, (60 / (rbpm * rd)) * 1000);
        }

        function ctrlStartOutro() {
            clearInterval(ctrlIntervalId);
            ctrlIsOutro = true;
            ctrlCurrentCycle = 0;
            ctrlCurrentBeat = 0;
            const section = ctrlSections[ctrlSections.length - 1];
            ctrlLoadMelodyForSection(section);
            const rd = section._resolvedDivision;
            const rbpm = section.bpm || parseInt(document.getElementById('bpm').value) || 120;
            ctrlCreateBeatIndicator(section._resolvedBeats);
            document.getElementById('ctrlStatusTitle').textContent = 'Playing Outro';
            document.getElementById('ctrlSectionDisplay').textContent = 'Outro';
            document.getElementById('ctrlCycleDisplay').textContent = '1/1';
            ctrlIntervalId = setInterval(ctrlPlayBeat, (60 / (rbpm * rd)) * 1000);
        }

        function ctrlUpdateStatus() {
            if (ctrlIsIntro) {
                document.getElementById('ctrlStatusTitle').textContent = 'Playing Intro';
                document.getElementById('ctrlSectionDisplay').textContent = 'Intro';
                document.getElementById('ctrlCycleDisplay').textContent = '1/1';
            } else if (ctrlIsOutro) {
                document.getElementById('ctrlStatusTitle').textContent = 'Playing Outro';
                document.getElementById('ctrlSectionDisplay').textContent = 'Outro';
                document.getElementById('ctrlCycleDisplay').textContent = '1/1';
            } else if (ctrlCurrentSectionIndex >= 0) {
                const section = ctrlSections[ctrlCurrentSectionIndex];
                document.getElementById('ctrlStatusTitle').textContent = 'Playing ' + section.name;
                document.getElementById('ctrlSectionDisplay').textContent = section.name;
                document.getElementById('ctrlCycleDisplay').textContent =
                    section.cycles === 0 ? ctrlCurrentCycle + ' (looping)' : ctrlCurrentCycle + '/' + section.cycles;
            }
        }

        function ctrlSaveStructurePreset() {
            const name = prompt('Name for this solo structure:');
            if (!name) return;
            const key = 'ctrlStruct_' + name.replace(/[^a-zA-Z0-9\s]/g, '_').replace(/\s/g, '_');
            const data = {
                sections: ctrlSections.map(s => ({...s})),
                introEnabled: ctrlIntroEnabled,
                outroEnabled: ctrlOutroEnabled,
                introBeat: parseInt(document.getElementById('ctrlIntroBeat').value) || 1,
                outroBeat: parseInt(document.getElementById('ctrlOutroBeat').value) || 1,
            };
            localStorage.setItem(key, JSON.stringify(data));
            ctrlPopulateStructurePresets();
            showToast('✓ Structure saved: ' + name);
        }

        function ctrlLoadStructurePreset() {
            const key = document.getElementById('ctrlStructurePreset').value;
            if (!key) return;
            try {
                const data = JSON.parse(localStorage.getItem(key));
                ctrlSections = data.sections.map(s => ({...s}));
                ctrlIntroEnabled = data.introEnabled || false;
                ctrlOutroEnabled = data.outroEnabled || false;
                document.getElementById('ctrlIntroToggle').classList.toggle('active', ctrlIntroEnabled);
                document.getElementById('ctrlOutroToggle').classList.toggle('active', ctrlOutroEnabled);
                document.getElementById('ctrlIntroBeat').value = data.introBeat || 1;
                document.getElementById('ctrlOutroBeat').value = data.outroBeat || 1;
                ctrlRenderSections();
                showToast('✓ Structure loaded');
            } catch(e) {
                alert('Error loading: ' + e.message);
            }
        }

        function ctrlDeleteStructurePreset() {
            const key = document.getElementById('ctrlStructurePreset').value;
            if (!key) return;
            if (confirm('Delete this structure preset?')) {
                localStorage.removeItem(key);
                ctrlPopulateStructurePresets();
                showToast('Preset deleted');
            }
        }

        function ctrlPopulateStructurePresets() {
            const select = document.getElementById('ctrlStructurePreset');
            select.innerHTML = '<option value="">--- Select a Structure Preset ---</option>';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('ctrlStruct_')) {
                    const name = key.substring(11);
                    const opt = document.createElement('option');
                    opt.value = key;
                    opt.textContent = name;
                    select.appendChild(opt);
                }
            }
        }

        // Wire up controller buttons
        document.getElementById('ctrlStartBtn').addEventListener('click', ctrlStart);
        document.getElementById('ctrlNextBtn').addEventListener('click', ctrlNextSection);
        document.getElementById('ctrlStopBtn').addEventListener('click', ctrlStop);
        document.getElementById('ctrlResetBtn').addEventListener('click', ctrlReset);
        document.getElementById('ctrlIntroToggle').addEventListener('click', function() {
            ctrlIntroEnabled = !ctrlIntroEnabled;
            this.classList.toggle('active');
        });
        document.getElementById('ctrlOutroToggle').addEventListener('click', function() {
            ctrlOutroEnabled = !ctrlOutroEnabled;
            this.classList.toggle('active');
        });

        // Initial controller render
        ctrlRenderSections();
        ctrlPopulateStructurePresets();

        // ── BPM sync during controller playback ──────────────────────────
        // Already done inline in ctrlPlayBeat via ctrlBpmDisplay.
        // Also mirror controller BPM to the main slider so it's always visible:
        function ctrlSyncBpmToMain(bpm) {
            document.getElementById('bpm').value = bpm;
            document.getElementById('bpmInput').value = bpm;
            document.getElementById('bpmValue').textContent = bpm;
        }

        // ── Keyboard shortcut: Space = play/stop ─────────────────────────
        document.addEventListener('keydown', (e) => {
            // Only if focus is NOT on an input/select/textarea
            const tag = document.activeElement.tagName;
            if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) {
                    stopPlayback();
                } else {
                    startPlayback();
                }
            }
        });

        // ── Inline toast notification (replaces alert() for presets) ─────
        function showToast(msg, type='ok') {
            let toast = document.getElementById('lehra-toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'lehra-toast';
                toast.style.cssText = `position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
                    padding:10px 22px;border-radius:10px;font-family:'Inter',sans-serif;
                    font-size:0.9em;font-weight:600;z-index:9999;pointer-events:none;
                    box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:opacity 0.4s;`;
                document.body.appendChild(toast);
            }
            toast.style.background = type === 'err' ? '#c0392b' : '#3d6b41';
            toast.style.color = '#fff';
            toast.textContent = msg;
            toast.style.opacity = '1';
            clearTimeout(toast._t);
            toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2200);
        }

        // ===== END SOLO STRUCTURE CONTROLLER =====
    </script>
</body>
</html>
